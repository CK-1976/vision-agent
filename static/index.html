<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 90vh;
            max-height: 900px;
        }

        .sidebar {
            background: #f7f7f7;
            padding: 25px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }

        .image-upload {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .image-upload:hover {
            border-color: #667eea;
            background: #f0f0f0;
        }

        .image-upload.has-image {
            border-color: #667eea;
            padding: 8px;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: none;
        }

        #imagePreview.show {
            display: block;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
        }

        .examples {
            margin-top: auto;
        }

        .examples h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }

        .example-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            text-align: left;
            transition: all 0.2s;
        }

        .example-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0; /* 关键：允许flex子元素收缩 */
        }

        .chat-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex-shrink: 0; /* 防止标题被压缩 */
        }

        .chat-header h2 {
            font-size: 20px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            background: #fafafa;
            scroll-behavior: smooth;
            min-height: 0; /* 关键：允许内容滚动 */
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message.assistant .message-content pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message.assistant .message-content img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message.assistant .message-content img:hover {
            transform: scale(1.02);
        }

        .chat-input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0; /* 防止输入框被压缩 */
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #f44336;
            padding: 8px 20px;
            font-size: 13px;
        }

        /* 图片查看器 */
        .image-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .image-viewer.show {
            display: flex;
        }

        .image-viewer img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .loading {
            padding: 10px;
            text-align: center;
            color: #666;
            font-size: 14px;
            background: #fafafa;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: 95vh;
            }

            .sidebar {
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                overflow-y: auto;
            }

            .chat-area {
                min-height: 0;
            }

            .chat-messages {
                padding: 15px;
            }

            .message-content {
                max-width: 85%;
            }

            .examples {
                display: none;
            }

            .header h1 {
                font-size: 18px;
            }

            .header p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div class="header">
                <h1>🤖 Vision Agent</h1>
                <p>上传图片并提问，Agent 会自动调用检测工具获取信息后回答问题。</p>
            </div>

            <div class="image-upload" onclick="document.getElementById('imageInput').click()">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                <img id="imagePreview" alt="预览">
                <div id="uploadText" class="upload-text">
                    📷 点击上传图片<br>
                    <small>支持 JPG, PNG 格式</small>
                </div>
            </div>

            <button class="clear-btn" onclick="clearImage()">清除图片</button>

            <div class="examples">
                <h3>💡 示例问题</h3>
                <button class="example-btn" onclick="useExample('这张图里有几个人，坐标是什么')">这张图里有几个人，坐标是什么</button>
                <button class="example-btn" onclick="useExample('有拿着吉他的人吗')">有拿着吉他的人吗</button>
                <button class="example-btn" onclick="useExample('图中有车吗？在什么位置')">图中有车吗？在什么位置</button>
                <button class="example-btn" onclick="useExample('检测所有物体')">检测所有物体</button>
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="chat-area">
            <div class="chat-header">
                <h2>💬 对话</h2>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-content">
                        你好！我是 Vision Agent。<br>
                        上传图片并提问，我会帮你分析图片内容。<br>
                        <small style="color: #999;">💡 支持物体检测、位置定位、颜色识别等</small>
                    </div>
                </div>
            </div>

            <div class="loading" id="loading">Agent 正在思考中</div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()" id="sendBtn">发送</button>
                    <button onclick="clearChat()" class="clear-btn" style="margin-left: 5px;">清空</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图片查看器 -->
    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <img id="viewerImage" alt="查看图片">
    </div>

    <script>
        let sessionId = null;
        let currentImage = null;

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                currentImage = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.classList.add('show');
                    document.getElementById('uploadText').style.display = 'none';
                    document.querySelector('.image-upload').classList.add('has-image');
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImage() {
            currentImage = null;
            document.getElementById('imagePreview').classList.remove('show');
            document.getElementById('uploadText').style.display = 'block';
            document.querySelector('.image-upload').classList.remove('has-image');
            document.getElementById('imageInput').value = '';
        }

        function useExample(text) {
            document.getElementById('messageInput').value = text;
            document.getElementById('messageInput').focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // 添加用户消息到界面
            addMessage(message, 'user');
            input.value = '';

            // 显示加载状态
            const loading = document.getElementById('loading');
            const sendBtn = document.getElementById('sendBtn');
            loading.classList.add('show');
            sendBtn.disabled = true;

            try {
                // 准备表单数据
                const formData = new FormData();
                formData.append('message', message);
                if (sessionId) {
                    formData.append('session_id', sessionId);
                }
                if (currentImage) {
                    formData.append('image', currentImage);
                }

                // 发送请求
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // 保存会话ID
                    sessionId = data.session_id;

                    // 添加助手回复
                    addMessage(data.response, 'assistant', data.visualization);
                } else {
                    addMessage('❌ 错误: ' + (data.detail || '未知错误'), 'assistant');
                }
            } catch (error) {
                addMessage('❌ 网络错误: ' + error.message, 'assistant');
            } finally {
                loading.classList.remove('show');
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, role, visualization = null) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // 如果有检测后的图片，先显示图片
            if (visualization) {
                const img = document.createElement('img');
                img.src = visualization;
                img.alt = '检测结果';
                img.onclick = function(e) {
                    e.stopPropagation();
                    openImageViewer(visualization);
                };
                // 图片加载完成后滚动到底部
                img.onload = function() {
                    scrollToBottom();
                };
                contentDiv.appendChild(img);
            }

            // 处理换行和代码块
            const textNode = document.createElement('div');
            const formatted = text.replace(/\n/g, '<br>');
            textNode.innerHTML = formatted;
            contentDiv.appendChild(textNode);

            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);

            // 滚动到底部
            scrollToBottom();
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('chatMessages');
            // 使用 requestAnimationFrame 确保 DOM 更新后再滚动
            requestAnimationFrame(() => {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        function clearChat() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = `
                <div class="message assistant">
                    <div class="message-content">
                        对话已清空。上传图片并提问吧！<br>
                        <small style="color: #999;">💡 支持物体检测、位置定位、颜色识别等</small>
                    </div>
                </div>
            `;
            sessionId = null;
        }

        function openImageViewer(src) {
            const viewer = document.getElementById('imageViewer');
            const img = document.getElementById('viewerImage');
            img.src = src;
            viewer.classList.add('show');
        }

        function closeImageViewer() {
            const viewer = document.getElementById('imageViewer');
            viewer.classList.remove('show');
        }
    </script>
</body>
</html>
